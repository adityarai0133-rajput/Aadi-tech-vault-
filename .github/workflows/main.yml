name: Build Aadi Tech Vault EXE

on:
  push:
    tags:
      - 'v*' # Tags par bhi chalega
  workflow_dispatch: # Isse tu GitHub par manually click karke bhi EXE bana sakta hai

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask pycryptodome pyinstaller

    - name: Compile App with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "templates;templates" --name "Aadi_Tech_Vault" app.py

    - name: Zip the Output Directory
      run: |
        powershell Compress-Archive -Path dist/Aadi_Tech_Vault -DestinationPath dist/Aadi_Tech_Vault_v1.zip

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: dist/Aadi_Tech_Vault_v1.zip
        tag_name: "v1.0.0-build"  # 🔥 Yeh line bina tag ke bhi automatic release bana degi!
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
