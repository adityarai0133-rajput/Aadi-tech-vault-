name: Build Aadi Tech Vault EXE

on:
  push:
    branches:
      - main # Jab bhi main branch par push hoga chalega
  workflow_dispatch: # Isse tu manually click karke bina kisi error ke chalu kar sakta hai

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask pycryptodome pyinstaller

    - name: Compile App with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "templates;templates" --name "Aadi_Tech_Vault" app.py

    - name: Zip the Output Directory
      run: |
        powershell Compress-Archive -Path dist/Aadi_Tech_Vault -DestinationPath dist/Aadi_Tech_Vault_v1.zip

    - name: Upload EXE Artifact Without Version Errors
      uses: actions/upload-artifact@v4
      with:
        name: Aadi_Tech_Vault_Windows_EXE
        path: dist/Aadi_Tech_Vault_v1.zip
        
